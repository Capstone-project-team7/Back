# S3 설정 - 테스트 목적으로 더미 값 사용 (실제 테스트 시 본인의 키로 변경 필요)
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
cloud.aws.region.static=ap-northeast-2
cloud.aws.s3.bucket=cctv-recordings-yuhan-20250505
cloud.aws.stack.auto=false

# S3 관련 커스텀 설정
aws.s3.video-prefix=clips/
aws.s3.thumbnail-prefix=thumbnails/
aws.s3.presigned-url.expiration-minutes=10

# 데이터베이스 설정 (H2 인메모리 DB 사용)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# 로깅 설정
logging.level.com.capstone.meerkatai=DEBUG
logging.level.org.springframework.cloud.aws=DEBUG
logging.level.com.amazonaws=DEBUG 