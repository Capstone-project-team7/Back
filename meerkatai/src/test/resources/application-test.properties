# S3 설정 - 환경 변수 사용
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
cloud.aws.region.static=${AWS_DEFAULT_REGION:ap-northeast-2}
cloud.aws.s3.bucket=${AWS_S3_BUCKET:cctv-recordings-yuhan-20250505}
cloud.aws.stack.auto=false

# S3 관련 커스텀 설정
aws.s3.video-prefix=${AWS_S3_VIDEO_PREFIX:clips/}
aws.s3.thumbnail-prefix=${AWS_S3_THUMBNAIL_PREFIX:thumbnails/}
aws.s3.presigned-url.expiration-minutes=${AWS_S3_PRESIGNED_URL_EXPIRATION:10}

# 데이터베이스 설정 (H2 인메모리 DB 사용)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# 로깅 설정
logging.level.com.capstone.meerkatai=DEBUG
logging.level.org.springframework.cloud.aws=DEBUG
logging.level.com.amazonaws=DEBUG

# 이메일 테스트 설정
APP_EMAIL=${APP_EMAIL:test@example.com}
APP_EMAIL_PASSWORD=${APP_PASSWORD:test_password}
ADMIN_EMAIL=${ADMIN_EMAIL:admin@example.com}

# JWT 테스트 설정 - 환경 변수 사용
jwt.secret=${JWT_SECRET_KEY:testsecretkeyforcapstonemeerkataitestsecretkeyforcapstonemeerkatai}
jwt.token-validity-in-milliseconds=${JWT_EXPIRATION:3600000} 