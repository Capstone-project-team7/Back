# 테스트 프로필 설정
spring.profiles.active=test

# AWS Region
cloud.aws.region.static=ap-northeast-2

# EC2 관련 설정 비활성화
cloud.aws.stack.auto=false

# S3 설정
aws.s3.bucket-name=cctv-recordings-yuhan-20250505
cloud.aws.s3.bucket=cctv-recordings-yuhan-20250505

# Pre-signed URL 유효 시간 (분 단위)
aws.s3.presigned-url.expiration-minutes=10

# 영상 및 썸네일 경로 Prefix
aws.s3.video-prefix=clips/
aws.s3.thumbnail-prefix=thumbnails/

# 테스트 환경용 더미 인증 정보 (실제 값이 아님)
cloud.aws.credentials.access-key=test-access-key
cloud.aws.credentials.secret-key=test-secret-key

# H2 데이터베이스 설정
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# 빈 정의 오버라이딩 허용 설정
spring.main.allow-bean-definition-overriding=true 